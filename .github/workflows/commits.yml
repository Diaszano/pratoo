name: Conventional Commits

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install commitlint
        run: |
          npm install --save-dev @commitlint/cli @commitlint/config-conventional

      - name: Validate PR commits (excluding merges)
        run: |
          set +e
          failed=0
          for sha in $(git rev-list --no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}); do
            echo "--- Checking commit $sha ---"
            npx commitlint --from "$sha^" --to "$sha" --verbose
            if [ $? -ne 0 ]; then
              failed=1
            fi
          done
          exit $failed
